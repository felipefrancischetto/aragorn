<div class="row">
  <div class="col-lg-12">
    <nb-card>
      <nb-card-header>Cadastro de Usuário</nb-card-header>
      <nb-card-body>

        <div class="row">
          <div class="col-3">
            <input type="text" nbInput fullWidth shape="round" placeholder="Username">
          </div>
          <div class="col-3">
            <input type="text" nbInput fullWidth shape="round" placeholder="Senha">
          </div>
          <div class="col-6">
            <input type="text" nbInput fullWidth shape="round" placeholder="Endereço de E-mail">
          </div>
        </div>

        <div class="row mt-4">
          <div class="col-6">
            <input type="text" nbInput fullWidth shape="round" placeholder="Nome">
          </div>
          <div class="col-6">
            <input type="text" nbInput fullWidth shape="round" placeholder="Sobrenome">
          </div>
        </div>

        <div class="row mt-4">
          <div class="col-12">
            <input type="text" nbInput fullWidth shape="round" placeholder="Endereço">
          </div>
        </div>

        <div class="row mt-4">
          <div class="col-4">
            <input type="text" nbInput fullWidth shape="round" placeholder="Cidade">
          </div>
          <div class="col-4">
            <input type="text" nbInput fullWidth shape="round" placeholder="País">
          </div>
          <div class="col-4">
            <input type="text" nbInput fullWidth shape="round" placeholder="CEP">
          </div>
        </div>

        <div class="row mt-4">
          <div class="col-12">
            <textarea rows="5" nbInput fullWidth shape="round" placeholder="Biografia"></textarea>
          </div>
        </div>

        <button class="mt-4 float-right" nbButton shape="round" [status]="'primary'" >
          Salvar
        </button>

      </nb-card-body>
    </nb-card>
  </div>
<div>
